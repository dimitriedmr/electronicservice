<!doctype html>
<html lang="ro" data-bs-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Main page">
    <meta name="author" content="Electronic Service">
    
    <title>
      Electronic Service Pascani
    </title>
    
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/navbar-fixed.css" rel="stylesheet" />
    <link href="css/carousel.css" rel="stylesheet" />
            
  </head>

  <body>
    <div id="nav-placeholder">
    </div>
    
    <main>
      <div id="myCarousel" class="carousel slide mb-6" data-bs-ride="carousel"> <!-- from: carousel example -->
        <div class="carousel-indicators">
          <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="1"></button>
          <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1" aria-label="2"></button>
          <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2" aria-label="3"></button>
        </div>
        <div class="carousel-inner">

          <div class="carousel-item active">
            <img class="d-block w-100" alt="imagine-interior-magazin" src="img/inside-mid.jpg" data-holder-rendered="true">
            <div class="carousel-caption opacity-75 d-none d-md-block">
              <h3>REPARATII TV, LCD, PLASMA, TELECOMENZI</h3>
            </div>
          </div>

          <div class="carousel-item">
            <img class="d-block w-100" alt="imagine-interior-magazin" src="img/inside-left-corner.jpg" data-holder-rendered="true">
              <div class="carousel-caption opacity-75 d-none d-md-block">
                <h3>STATII, ANTENE TIR</h3>
              </div>
          </div>

          <div class="carousel-item">
            <img class="d-block w-100" alt="imagine-interior-magazin" src="img/inside2.jpg" data-holder-rendered="true">
              <div class="carousel-caption opacity-75 d-none d-md-block">
                <h3>CASETOFOANE, MP3 AUTO, MASINI DE SPALAT</h3>
              </div>
          </div>

        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#myCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>

      <div id="footer-placeholder">
      </div>
    </main>

    <script src="js/external-parts-loader.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>

  </body>
</html>
